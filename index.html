<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pastane POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
  :root{
    --wine:#6B2737; --wine-2:#8A3548; --gold:#C98A3E; --gold-2:#E0A85B;
    --cream:#FAF6EF; --cream-2:#F0E6D8; --ink:#2B2119;
    --esp:#1B1412; --esp-2:#2A201D; --esp-3:#382B26; --cream-text:#F0E6DC;
    --green:#4C7A5E; --red:#B23A3A;
  }
  html,body{ margin:0; padding:0; background:var(--cream); }
  .app-root{ font-family:'Inter',sans-serif; background:var(--cream); color:var(--ink); }
  .dark .app-root{ background:var(--esp); color:var(--cream-text); }
  .disp{ font-family:'Space Grotesk',sans-serif; }
  .mono{ font-family:'JetBrains Mono',monospace; }
  .receipt-edge{
    background-image: radial-gradient(circle at 8px 0, transparent 7px, var(--cream) 7.5px);
    background-size: 16px 16px; background-position: top left; background-repeat: repeat-x;
  }
  .dark .receipt-edge{
    background-image: radial-gradient(circle at 8px 0, transparent 7px, var(--esp-2) 7.5px);
  }
  @media print {
    .no-print{ display:none !important; }
    .print-area{ position:absolute; inset:0; }
  }
  #root{ min-height:100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ================================================================== */

  cart: "M3 4h2l2.2 12.2a1 1 0 001 .8h9.6a1 1 0 001-.8L21 8H6M9 21a1 1 0 100-2 1 1 0 000 2zM18 21a1 1 0 100-2 1 1 0 000 2z",

  store: "M4 9l1-5h14l1 5M4 9v11h16V9M4 9h16M9 20v-6h6v6",
  alert: "M12 3l9 17H3l9-17zM12 10v4M12 17v.01",

  image: "M4 5h16v14H4V5zM4 16l5-5 3 3 4-5 4 5M9 9a1 1 0 100-2 1 1 0 000 2z",

function Icon({ name, className }) {
  const d = ICONS[name] || ICONS.package;
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"
      strokeLinecap="round" strokeLinejoin="round" className={className}>
      <path d={d} />
    </svg>
  );
}

/* ================================================================== */
/*  SABİTLER                                                            */
/* ================================================================== */

const CATS = {
  pasta:      { icon: "cake",      keyword: "cake,pastry",  label: "Pasta" },
  dondurma:   { icon: "icecream",  keyword: "ice-cream",    label: "Dondurma" },
  kuruyemis:  { icon: "package",   keyword: "nuts",         label: "Kuruyemiş" },
  ekmek:      { icon: "croissant", keyword: "bread,bakery", label: "Fırın" },
};

const DEFAULT_PRODUCTS = [
  ["Kuru Pasta","kg",280,"pasta"],
  ["Dondurma","kg",300,"dondurma"],
  ["Çikolatalı Ekler","adet",10,"pasta"],
  ["Çilekli Ekler","adet",10,"pasta"],
  ["Karamelli Ekler","adet",10,"pasta"],
  ["Dilim Pasta","adet",50,"pasta"],
  ["Yaş Pasta Çeşitleri","degisken",null,"pasta"],
  ["Fıstık","kg",290,"kuruyemis"],
  ["Siyah Çekirdek","kg",180,"kuruyemis"],
  ["Soslu Mısır","kg",180,"kuruyemis"],
  ["Kabak Çekirdeği","kg",350,"kuruyemis"],
  ["Triliçe","kg",300,"pasta"],
  ["Dondurma Top","adet",25,"dondurma"],
  ["Ayarlanabilir Dondurma","degisken",null,"dondurma"],
  ["Kaynana Sopası","adet",100,"pasta"],
  ["Bayram Kömbesi","kg",280,"ekmek"],
  ["Simit","adet",15,"ekmek"],
  ["Poğaça","adet",15,"ekmek"],
  ["Açma","adet",15,"ekmek"],
  ["Biberli Ekmek","adet",15,"ekmek"],
  ["Dondurma 500 gr Paket","adet",150,"dondurma"],
  ["Dondurma 250 gr Paket","adet",75,"dondurma"],
  ["Dondurma Kase Paket","adet",35,"dondurma"],
].map((p, i) => ({
  id: `p${i + 1}`,
  name: p[0],
  type: p[1],
  price: p[2],
  category: p[3],
  barcode: `8690000${String(i + 1).padStart(5, "0")}`,
  image: null,
}));

const PAY_METHODS = [
  { id: "nakit", label: "Nakit", icon: "banknote" },
  { id: "kart", label: "Kart", icon: "creditcard" },
  { id: "iban", label: "IBAN", icon: "landmark" },
  { id: "karisik", label: "Karışık", icon: "shuffle" },
];

const money = (n) =>
  (Math.round((n || 0) * 100) / 100).toLocaleString("tr-TR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ₺";

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

/* ================================================================== */
/*  KALICI DEPOLAMA (localStorage - tarayıcı hafızası)                 */
/* ================================================================== */

function lsGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch (e) { console.error("Depolama hatası", key, e); }
}

/* ================================================================== */
/*  ÜRÜN GÖRSELİ - internetten otomatik çekilir, yoksa ikon gösterilir */
/* ================================================================== */

function ProductImage({ product, className }) {
  const [failed, setFailed] = useState(false);
  const cat = CATS[product.category] || CATS.pasta;
  const src =
    product.image ||
    `https://loremflickr.com/320/320/${encodeURIComponent(cat.keyword)}?lock=${(product.id || "1").replace(/\D/g, "") || 1}`;

  if (failed) {
    return (
      <div className={`flex items-center justify-center bg-[var(--cream-2)] dark:bg-[var(--esp-2)] ${className}`}>
        <Icon name={cat.icon} className="w-8 h-8 text-[var(--wine)] dark:text-[var(--gold)]" />
      </div>
    );
  }
  return (
    <img src={src} alt={product.name} loading="lazy" onError={() => setFailed(true)} className={`object-cover ${className}`} />
  );
}

/* ================================================================== */
/*  BASİT GRAFİKLER (harici kütüphane gerektirmez)                     */
/* ================================================================== */

function SimpleBarChart({ data, labelKey, valueKey }) {
  const max = Math.max(1, ...data.map((d) => d[valueKey]));
  return (
    <div className="flex items-end gap-1 h-40 overflow-x-auto pb-1">
      {data.map((d, i) => (
        <div key={i} className="flex flex-col items-center justify-end h-full flex-shrink-0" style={{ width: 26 }}>
          <div className="text-[9px] mono opacity-60 mb-1">{d[valueKey] > 0 ? Math.round(d[valueKey]) : ""}</div>
          <div className="w-4 rounded-t-md bg-[var(--wine)]" style={{ height: `${Math.max(2, (d[valueKey] / max) * 100)}%` }} />
          <div className="text-[8px] opacity-50 mt-1 mono rotate-0">{d[labelKey]}</div>
        </div>
      ))}
    </div>
  );
}

function SimplePieChart({ data, colors }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  let angle = 0;
  const R = 45, C = 50;
  const slices = data.map((d, i) => {
    const start = angle;
    const frac = d.value / total;
    angle += frac * 360;
    const end = angle;
    const toXY = (a) => {
      const rad = (a - 90) * Math.PI / 180;
      return [C + R * Math.cos(rad), C + R * Math.sin(rad)];
    };
    const [x1, y1] = toXY(start);
    const [x2, y2] = toXY(end);
    const large = end - start > 180 ? 1 : 0;
    const path = `M${C},${C} L${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} Z`;
    return <path key={i} d={path} fill={colors[i % colors.length]} />;
  });
  return (
    <div className="flex items-center gap-4">
      <svg viewBox="0 0 100 100" className="w-32 h-32 flex-shrink-0">{slices}</svg>
      <div className="space-y-1.5">
        {data.map((d, i) => (
          <div key={i} className="flex items-center gap-2 text-xs">
            <span className="w-2.5 h-2.5 rounded-full inline-block" style={{ background: colors[i % colors.length] }} />
            <span className="opacity-70">{d.name}</span>
            <span className="mono font-semibold">{money(d.value)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================================================================== */
/*  ANA UYGULAMA                                                       */
/* ================================================================== */

function PastanePOS() {
  const [dark, setDark] = useState(() => lsGet("pastane-settings", {}).dark || false);
  const [logo, setLogo] = useState(() => lsGet("pastane-settings", {}).logo || null);
  const [products, setProducts] = useState(() => lsGet("pastane-products", DEFAULT_PRODUCTS));
  const [tables, setTables] = useState(() => lsGet("pastane-tables", {
    1: { items: [], waiting: false }, 2: { items: [], waiting: false }, 3: { items: [], waiting: false },
  }));
  const [quickCart, setQuickCart] = useState(() => lsGet("pastane-quickcart", []));
  const [sales, setSales] = useState(() => lsGet("pastane-sales", []));
  const [archives, setArchives] = useState(() => lsGet("pastane-archives", []));

  const [view, setView] = useState("pos");
  const [activeTable, setActiveTable] = useState(null);
  const [search, setSearch] = useState("");
  const [addModalProduct, setAddModalProduct] = useState(null);
  const [paymentOpen, setPaymentOpen] = useState(false);
  const [reportOpen, setReportOpen] = useState(false);
  const [scannerOpen, setScannerOpen] = useState(false);
  const [editingProduct, setEditingProduct] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(() => { lsSet("pastane-products", products); }, [products]);
  useEffect(() => { lsSet("pastane-tables", tables); }, [tables]);
  useEffect(() => { lsSet("pastane-quickcart", quickCart); }, [quickCart]);
  useEffect(() => { lsSet("pastane-sales", sales); }, [sales]);
  useEffect(() => { lsSet("pastane-archives", archives); }, [archives]);
  useEffect(() => { lsSet("pastane-settings", { dark, logo }); }, [dark, logo]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const currentCart = activeTable ? tables[activeTable].items : quickCart;

  const setCurrentCart = useCallback((updater) => {
    if (activeTable) {
      setTables((prev) => ({
        ...prev,
        [activeTable]: { ...prev[activeTable], items: typeof updater === "function" ? updater(prev[activeTable].items) : updater },
      }));
    } else {
      setQuickCart((prev) => (typeof updater === "function" ? updater(prev) : updater));
    }
  }, [activeTable]);

  const addLineToCart = (line) => {
    setCurrentCart((prev) => [...prev, { ...line, lineId: uid() }]);
    showToast(`${line.name} eklendi`);
  };
  const removeLine = (lineId) => setCurrentCart((prev) => prev.filter((l) => l.lineId !== lineId));
  const cartTotal = (items) => items.reduce((sum, l) => sum + l.lineTotal, 0);

  const addByBarcode = (code) => {
    const prod = products.find((p) => p.barcode === code);
    if (!prod) { showToast("Barkod bulunamadı"); return; }
    if (prod.type === "adet") {
      addLineToCart({ productId: prod.id, name: prod.name, type: "adet", qty: 1, unitPrice: prod.price, lineTotal: prod.price });
    } else {
      setAddModalProduct(prod);
    }
  };

  const completeSale = (breakdown) => {
    const items = currentCart;
    const total = cartTotal(items);
    const record = { id: uid(), date: new Date().toISOString(), items, total, tableId: activeTable || null, breakdown };
    setSales((prev) => [...prev, record]);
    if (activeTable) {
      setTables((prev) => ({ ...prev, [activeTable]: { items: [], waiting: false } }));
      setActiveTable(null);
    } else {
      setQuickCart([]);
    }
    setPaymentOpen(false);
    showToast("Ödeme tamamlandı");
  };

  const archiveDay = () => {
    if (sales.length === 0) { showToast("Kapatılacak satış yok"); return; }
    setArchives((prev) => [...prev, { date: new Date().toISOString(), sales }]);
    setSales([]);
    showToast("Gün kapatıldı ve arşivlendi");
  };

  const filteredProducts = useMemo(() => {
    const q = search.trim().toLocaleLowerCase("tr-TR");
    if (!q) return products;
    return products.filter((p) => p.name.toLocaleLowerCase("tr-TR").includes(q));
  }, [products, search]);

  const resetAll = () => {
    setProducts(DEFAULT_PRODUCTS);
    setTables({ 1: { items: [], waiting: false }, 2: { items: [], waiting: false }, 3: { items: [], waiting: false } });
    setQuickCart([]); setSales([]); setArchives([]); setLogo(null);
    showToast("Tüm veriler sıfırlandı");
  };

  return (
    <div className={dark ? "dark" : ""}>
      <div className="app-root min-h-screen flex flex-col">
        <TopBar logo={logo} dark={dark} setDark={setDark} onScan={() => setScannerOpen(true)} />

        <main className="flex-1 overflow-y-auto pb-24">
          {view === "pos" && (
            <POSView
              products={filteredProducts} search={search} setSearch={setSearch} cart={currentCart}
              onAdd={(p) => (p.type === "adet"
                ? addLineToCart({ productId: p.id, name: p.name, type: "adet", qty: 1, unitPrice: p.price, lineTotal: p.price })
                : setAddModalProduct(p))}
              activeTable={activeTable} setActiveTable={setActiveTable} onRemoveLine={removeLine}
              total={cartTotal(currentCart)} onPay={() => setPaymentOpen(true)} onDayEnd={() => setReportOpen(true)}
              salesCount={sales.length}
            />
          )}
          {view === "tables" && (
            <TablesView tables={tables} onOpenTable={(n) => { setActiveTable(n); setView("pos"); }}
              onToggleWait={(n) => setTables((prev) => ({ ...prev, [n]: { ...prev[n], waiting: !prev[n].waiting } }))} />
          )}
          {view === "management" && (
            <ManagementView products={products} onEdit={(p) => setEditingProduct(p)}
              onNew={() => setEditingProduct({ id: null, name: "", type: "adet", price: 0, category: "pasta", barcode: "", image: null })}
              onDelete={(id) => setProducts((prev) => prev.filter((p) => p.id !== id))} />
          )}
          {view === "settings" && (
            <SettingsView dark={dark} setDark={setDark} logo={logo} setLogo={setLogo} onReset={resetAll}
              archives={archives} sales={sales} products={products}
              onExport={() => exportBackup({ products, tables, sales, archives, logo })}
              onImport={(data) => {
                if (data.products) setProducts(data.products);
                if (data.tables) setTables(data.tables);
                if (data.sales) setSales(data.sales);
                if (data.archives) setArchives(data.archives);
                if ("logo" in data) setLogo(data.logo);
                showToast("Veriler geri yüklendi");
              }} />
          )}
        </main>

        <BottomNav view={view} setView={(v) => { setView(v); if (v !== "pos") setActiveTable(null); }} />

        {addModalProduct && (
          <AddToCartModal product={addModalProduct} onClose={() => setAddModalProduct(null)}
            onConfirm={(line) => { addLineToCart(line); setAddModalProduct(null); }} />
        )}
        {paymentOpen && (
          <PaymentModal total={cartTotal(currentCart)} onClose={() => setPaymentOpen(false)} onComplete={completeSale} />
        )}
        {reportOpen && (
          <ReportModal sales={sales} logo={logo} onClose={() => setReportOpen(false)}
            onArchive={() => { archiveDay(); setReportOpen(false); }} />
        )}
        {scannerOpen && (
          <ScannerModal onClose={() => setScannerOpen(false)} onDetect={(code) => { setScannerOpen(false); addByBarcode(code); }} />
        )}
        {editingProduct && (
          <ProductEditModal product={editingProduct} onClose={() => setEditingProduct(null)}
            onSave={(p) => {
              setProducts((prev) => (p.id ? prev.map((x) => (x.id === p.id ? p : x)) : [...prev, { ...p, id: uid() }]));
              setEditingProduct(null);
            }} />
        )}
        {toast && (
          <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-[var(--wine)] text-white px-4 py-2 rounded-full text-sm shadow-lg z-50 no-print">
            {toast}
          </div>
        )}
      </div>
    </div>
  );
}

function exportBackup(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `pastane-yedek-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

/* ================================================================== */
/*  ÜST BAR / ALT NAVİGASYON                                            */
/* ================================================================== */

function TopBar({ logo, dark, setDark, onScan }) {
  return (
    <header className="no-print sticky top-0 z-30 flex items-center justify-between px-4 py-3 border-b border-[var(--cream-2)] dark:border-[var(--esp-3)] bg-[var(--cream)]/95 dark:bg-[var(--esp)]/95 backdrop-blur">

function AddToCartModal({ product, onClose, onConfirm }) {
  const [qty, setQty] = useState(1);
  const [weight, setWeight] = useState(0.25);
  const [manualPrice, setManualPrice] = useState("");

  const confirm = () => {
    if (product.type === "kg") {
      if (weight <= 0) return;
      onConfirm({ productId: product.id, name: product.name, type: "kg", weight, unitPrice: product.price, lineTotal: +(weight * product.price).toFixed(2) });
    } else if (product.type === "degisken") {
      const val = parseFloat(manualPrice);
      if (!val || val <= 0) return;
      onConfirm({ productId: product.id, name: product.name, type: "degisken", unitPrice: val, lineTotal: val });
    } else {
      onConfirm({ productId: product.id, name: product.name, type: "adet", qty, unitPrice: product.price, lineTotal: qty * product.price });
    }
  };

  return (
    <ModalShell onClose={onClose} title={product.name}>
      <ProductImage product={product} className="w-full h-36 rounded-2xl mb-4" />
      {product.type === "kg" && (
        <>
          <label className="text-xs opacity-60 mb-1 block">Kilogram girin</label>
          <div className="flex items-center gap-2 mb-2">
            {[0.25, 0.5, 1].map((w) => (
              <button key={w} onClick={() => setWeight(w)} className="px-3 py-1.5 rounded-full bg-[var(--cream-2)] dark:bg-[var(--esp-3)] text-xs mono">{w} kg</button>
            ))}
          </div>
          <input type="number" step="0.001" min="0" value={weight} onChange={(e) => setWeight(parseFloat(e.target.value) || 0)}
            className="w-full px-4 py-3 rounded-2xl bg-[var(--cream-2)] dark:bg-[var(--esp-3)] mono text-lg font-bold outline-none mb-1" />
          <div className="text-right mono text-sm opacity-70 mb-4">Toplam: <b>{money(weight * product.price)}</b></div>
        </>
      )}
      {product.type === "degisken" && (
        <>
          <label className="text-xs opacity-60 mb-1 block">Fiyat girin (₺)</label>
          <input type="number" step="0.01" min="0" value={manualPrice} onChange={(e) => setManualPrice(e.target.value)} placeholder="0.00"
            className="w-full px-4 py-3 rounded-2xl bg-[var(--cream-2)] dark:bg-[var(--esp-3)] mono text-lg font-bold outline-none mb-4" />
        </>
      )}
      {product.type === "adet" && (
        <div className="flex items-center gap-4 mb-4 justify-center">
          <button onClick={() => setQty((q) => Math.max(1, q - 1))} className="w-11 h-11 rounded-full bg-[var(--cream-2)] dark:bg-[var(--esp-3)] flex items-center justify-center"><Icon name="minus" className="w-4 h-4" /></button>
          <span className="mono text-2xl font-bold w-10 text-center">{qty}</span>
          <button onClick={() => setQty((q) => q + 1)} className="w-11 h-11 rounded-full bg-[var(--cream-2)] dark:bg-[var(--esp-3)] flex items-center justify-center"><Icon name="plus" className="w-4 h-4" /></button>
        </div>
      )}
      <button onClick={confirm} className="w-full py-3.5 rounded-2xl bg-[var(--wine)] text-white font-semibold disp active:scale-[0.98] transition">Sepete Ekle</button>
    </ModalShell>
  );
}

function PaymentModal({ total, onClose, onComplete }) {
  const [method, setMethod] = useState("nakit");
  const [split, setSplit] = useState({ nakit: "", kart: "", iban: "" });
  const splitSum = (parseFloat(split.nakit) || 0) + (parseFloat(split.kart) || 0) + (parseFloat(split.iban) || 0);
  const splitOk = Math.abs(splitSum - total) < 0.01;

  const complete = () => {
    if (method === "karisik") {
      if (!splitOk) return;
      onComplete({ nakit: +split.nakit || 0, kart: +split.kart || 0, iban: +split.iban || 0 });
    } else {
      onComplete({ [method]: total });
    }
  };

  return (
    <ModalShell title="Ödeme" onClose={onClose}>
      <div className="text-center mb-5">
        <div className="text-xs opacity-60 mb-1">Ödenecek Tutar</div>
        <div className="mono text-3xl font-bold text-[var(--wine)] dark:text-[var(--gold)]">{money(total)}</div>
      </div>
      <div className="grid grid-cols-2 gap-2 mb-4">
        {PAY_METHODS.map((m) => {
          const active = method === m.id;
          return (
            <button key={m.id} onClick={() => setMethod(m.id)}
              className={`py-3 rounded-2xl flex flex-col items-center gap-1 text-xs font-medium border-2 transition ${active ? "border-[var(--wine)] bg-[var(--wine)]/10" : "border-transparent bg-[var(--cream-2)] dark:bg-[var(--esp-3)]"}`}>
              <Icon name={m.icon} className="w-5 h-5" /> {m.label}
            </button>
          );
        })}
      </div>
      {method === "karisik" && (
        <div className="space-y-2 mb-4">
          {["nakit", "kart", "iban"].map((k) => (
            <div key={k} className="flex items-center gap-2">
              <span className="text-xs w-14 opacity-60 capitalize">{k}</span>
              <input type="number" step="0.01" value={split[k]} onChange={(e) => setSplit((s) => ({ ...s, [k]: e.target.value }))} placeholder="0.00"
                className="flex-1 px-3 py-2 rounded-xl bg-[var(--cream-2)] dark:bg-[var(--esp-3)] mono text-sm outline-none" />
            </div>
          ))}
          <div className={`text-right text-xs mono ${splitOk ? "text-[var(--green)]" : "text-[var(--red)]"}`}>
            Toplam: {money(splitSum)} {splitOk ? "✓" : `(fark ${money(total - splitSum)})`}
          </div>
        </div>
      )}
      <button onClick={complete} disabled={method === "karisik" && !splitOk}
        className="w-full py-3.5 rounded-2xl bg-[var(--wine)] disabled:opacity-40 text-white font-semibold disp active:scale-[0.98] transition">
        Ödemeyi Tamamla
      </button>
    </ModalShell>
  );
}

const PIE_COLORS = ["#6B2737", "#C98A3E", "#4C7A5E"];

function ReportModal({ sales, logo, onClose, onArchive }) {
  const stats = useMemo(() => {
    const total = sales.reduce((s, r) => s + r.total, 0);
    const byMethod = { nakit: 0, kart: 0, iban: 0 };
    sales.forEach((r) => { Object.entries(r.breakdown || {}).forEach(([k, v]) => { byMethod[k] = (byMethod[k] || 0) + v; }); });
    const productAgg = {};
    sales.forEach((r) => r.items.forEach((l) => {
      const key = l.name;
      if (!productAgg[key]) productAgg[key] = { name: key, qty: 0, kg: 0, revenue: 0 };
      if (l.type === "kg") productAgg[key].kg += l.weight;
      else if (l.type === "adet") productAgg[key].qty += l.qty;
      else productAgg[key].qty += 1;
      productAgg[key].revenue += l.lineTotal;
    }));
    const topProducts = Object.values(productAgg).sort((a, b) => b.revenue - a.revenue).slice(0, 5);
    const hourly = Array.from({ length: 24 }, (_, h) => ({ hour: `${h}`, tutar: 0 }));
    sales.forEach((r) => { const h = new Date(r.date).getHours(); hourly[h].tutar += r.total; });
    const activeHours = hourly.filter((h) => h.tutar > 0);
    return {
      total, byMethod, topProducts, count: sales.length, avg: sales.length ? total / sales.length : 0,
      hourly: activeHours.length ? activeHours : hourly.slice(8, 20),
    };
  }, [sales]);

  const pieData = [
    { name: "Nakit", value: stats.byMethod.nakit },
    { name: "Kart", value: stats.byMethod.kart },
    { name: "IBAN", value: stats.byMethod.iban },
  ].filter((d) => d.value > 0);

  return (
    <div className="fixed inset-0 z-50 bg-black/50 overflow-y-auto">
      <div className="print-area min-h-full bg-[var(--cream)] dark:bg-[var(--esp)] max-w-2xl mx-auto p-5 sm:my-6 sm:rounded-3xl">
        <div className="no-print flex items-center justify-between mb-5">
          <button onClick={onClose}><Icon name="chevronleft" className="w-6 h-6" /></button>
          <span className="disp font-bold">Gün Sonu Raporu</span>
          <button onClick={() => window.print()}><Icon name="printer" className="w-5 h-5" /></button>
        </div>
        <div className="flex items-center gap-3 mb-6 pb-4 border-b-2 border-[var(--wine)]">
          {logo ? <img src={logo} className="w-12 h-12 rounded-xl object-cover" /> : <Icon name="store" className="w-10 h-10 text-[var(--wine)]" />}
          <div>
            <div className="disp font-bold text-lg">Pastane Günlük Satış Raporu</div>
            <div className="text-xs opacity-60">{new Date().toLocaleDateString("tr-TR", { day: "2-digit", month: "long", year: "numeric" })}</div>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-3 mb-6">
          <StatCard label="Toplam Satış" value={money(stats.total)} big />
          <StatCard label="İşlem Sayısı" value={stats.count} />
          <StatCard label="Ortalama Sepet" value={money(stats.avg)} />
          <StatCard label="Nakit / Kart / IBAN" value={`${money(stats.byMethod.nakit)} / ${money(stats.byMethod.kart)} / ${money(stats.byMethod.iban)}`} small />
        </div>
        {pieData.length > 0 && (
          <div className="mb-6">
            <h4 className="disp font-semibold text-sm mb-2">Ödeme Türü Dağılımı</h4>
            <SimplePieChart data={pieData} colors={PIE_COLORS} />
          </div>
        )}
        <div className="mb-6">
          <h4 className="disp font-semibold text-sm mb-2">Saatlik Satış Dağılımı</h4>
          <SimpleBarChart data={stats.hourly} labelKey="hour" valueKey="tutar" />
        </div>
        <div className="mb-6">
          <h4 className="disp font-semibold text-sm mb-2">En Çok Satılan Ürünler</h4>
          <div className="rounded-2xl overflow-hidden border border-[var(--cream-2)] dark:border-[var(--esp-3)]">
            {stats.topProducts.map((p, i) => (
              <div key={p.name} className={`flex items-center justify-between px-4 py-2.5 text-sm ${i % 2 ? "bg-white/40 dark:bg-white/5" : ""}`}>
                <span>{p.name}</span>
                <span className="mono opacity-70">{p.kg > 0 ? `${p.kg.toFixed(3)} kg` : `${p.qty} adet`} · <b>{money(p.revenue)}</b></span>
              </div>
            ))}
            {stats.topProducts.length === 0 && <div className="p-4 text-center text-sm opacity-50">Veri yok</div>}
          </div>
        </div>
        <button onClick={onArchive} className="no-print w-full py-3.5 rounded-2xl bg-[var(--wine)] text-white font-semibold disp flex items-center justify-center gap-2 active:scale-[0.98] transition">
          <Icon name="rotate" className="w-4 h-4" /> Günü Arşivle ve Sıfırla
        </button>
      </div>
    </div>
  );
}

function StatCard({ label, value, big, small }) {
  return (
    <div className="bg-white dark:bg-[var(--esp-2)] rounded-2xl p-3.5 border border-[var(--cream-2)] dark:border-[var(--esp-3)]">
      <div className="text-[11px] opacity-60 mb-1">{label}</div>
      <div className={`mono font-bold ${big ? "text-xl" : small ? "text-[11px]" : "text-base"} text-[var(--wine)] dark:text-[var(--gold)]`}>{value}</div>
    </div>
  );
}

/* ================================================================== */
/*  AYARLAR                                                              */
/* ================================================================== */

function SettingsView({ dark, setDark, logo, setLogo, onReset, archives, sales, products, onExport, onImport }) {
  const [confirmReset, setConfirmReset] = useState(false);
  const fileRef = useRef();
  const importRef = useRef();

  const onLogoPick = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setLogo(reader.result);
    reader.readAsDataURL(file);
  };
  const onImportPick = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { try { onImport(JSON.parse(reader.result)); } catch { alert("Geçersiz yedek dosyası"); } };
    reader.readAsText(file);
  };

  return (
    <div className="px-4 pt-4 space-y-5">
      <Section title="Görünüm">
        <SettingRow icon={dark ? "sun" : "moon"} label={dark ? "Gündüz Moduna Geç" : "Gece Moduna Geç"} onClick={() => setDark(!dark)} />
      </Section>
      <Section title="Logo">
        <div className="flex items-center gap-3 p-3">
          {logo ? <img src={logo} className="w-12 h-12 rounded-xl object-cover" /> : <div className="w-12 h-12 rounded-xl bg-[var(--cream-2)] dark:bg-[var(--esp-3)] flex items-center justify-center"><Icon name="image" className="w-5 h-5 opacity-40" /></div>}
          <button onClick={() => fileRef.current.click()} className="text-xs px-3 py-2 rounded-xl bg-[var(--cream-2)] dark:bg-[var(--esp-3)] flex items-center gap-1.5"><Icon name="upload" className="w-3.5 h-3.5" /> Logo Yükle</button>
          {logo && <button onClick={() => setLogo(null)} className="text-xs px-3 py-2 rounded-xl bg-[var(--red)]/10 text-[var(--red)]">Kaldır</button>}
          <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={onLogoPick} />
        </div>
      </Section>
      <Section title="Veri Yönetimi">
        <SettingRow icon="download" label="Verileri Yedekle (.json indir)" onClick={onExport} />
        <SettingRow icon="upload" label="Yedekten Geri Yükle" onClick={() => importRef.current.click()} />
        <input ref={importRef} type="file" accept="application/json" className="hidden" onChange={onImportPick} />
        <SettingRow icon="trash" label="Tüm Verileri Sil" danger onClick={() => setConfirmReset(true)} />
      </Section>
      <Section title="Barkod Ayarları">
        <div className="p-3 text-xs opacity-60 leading-relaxed">Barkodlar Ürün Yönetimi ekranından her ürün için düzenlenebilir.</div>
      </Section>
      <Section title="Yazıcı Ayarları">
        <div className="p-3 text-xs opacity-60 leading-relaxed">Gün sonu raporu tarayıcının yazdırma özelliği ile A4'e uygun şekilde yazdırılabilir veya "PDF olarak kaydet" seçeneğiyle PDF'e dönüştürülebilir.</div>
      </Section>
      <Section title="Kamera Ayarları">
        <div className="p-3 text-xs opacity-60 leading-relaxed">Barkod tarama HTTPS üzerinden açıldığında ve kamera izni verildiğinde çalışır. Dosyayı doğrudan (file://) açarsanız kamera engellenebilir; bu durumda barkodu manuel girebilirsiniz.</div>
      </Section>
      <div className="text-center text-[11px] opacity-40 pt-2">{products.length} ürün · {sales.length} bekleyen işlem · {archives.length} arşivlenmiş gün</div>

      {confirmReset && (
        <ModalShell title="Emin misiniz?" onClose={() => setConfirmReset(false)}>
          <div className="flex items-center gap-2 mb-4 text-[var(--red)]">
            <Icon name="alert" className="w-5 h-5" />
            <span className="text-sm">Bu işlem tüm ürünleri, masaları, satışları ve arşivi kalıcı olarak silecek.</span>
          </div>
          <div className="flex gap-2">
            <button onClick={() => setConfirmReset(false)} className="flex-1 py-3 rounded-2xl bg-[var(--cream-2)] dark:bg-[var(--esp-3)] font-medium">Vazgeç</button>
            <button onClick={() => { onReset(); setConfirmReset(false); }} className="flex-1 py-3 rounded-2xl bg-[var(--red)] text-white font-semibold">Sil</button>
          </div>
        </ModalShell>
      )}
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div>
      <h4 className="text-xs font-semibold opacity-50 uppercase tracking-wide mb-2 px-1">{title}</h4>
      <div className="bg-white dark:bg-[var(--esp-2)] rounded-2xl border border-[var(--cream-2)] dark:border-[var(--esp-3)] divide-y divide-[var(--cream-2)] dark:divide-[var(--esp-3)] overflow-hidden">
        {children}
      </div>
    </div>
  );
}

function SettingRow({ icon, label, onClick, danger }) {
  return (
    <button onClick={onClick} className="w-full flex items-center gap-3 p-3.5 text-sm active:bg-black/5 dark:active:bg-white/5 transition">
      <Icon name={icon} className={`w-4.5 h-4.5 ${danger ? "text-[var(--red)]" : "opacity-60"}`} />
      <span className={danger ? "text-[var(--red)] font-medium" : ""}>{label}</span>
    </button>
  );
}

/* ================================================================== */
/*  BARKOD TARAYICI                                                      */
/* ================================================================== */

function ScannerModal({ onClose, onDetect }) {
  const videoRef = useRef();
  const [error, setError] = useState(null);
  const [manual, setManual] = useState("");
  const [supported, setSupported] = useState(true);

  useEffect(() => {
    let stream; let stop = false;
    async function start() {
      if (!("BarcodeDetector" in window)) { setSupported(false); return; }
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        if (stop) return;
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
        const detector = new window.BarcodeDetector({ formats: ["ean_13", "ean_8", "code_128", "upc_a", "upc_e"] });
        const loop = async () => {
          if (stop) return;
          try {
            const codes = await detector.detect(videoRef.current);
            if (codes.length > 0) { onDetect(codes[0].rawValue); return; }
          } catch {}
          requestAnimationFrame(loop);
        };
        loop();
      } catch (e) {
        setError("Kameraya erişilemedi. HTTPS üzerinden açtığınızdan ve izin verdiğinizden emin olun, ya da barkodu manuel girin.");
      }
    }
    start();
    return () => { stop = true; if (stream) stream.getTracks().forEach((t) => t.stop()); };
  }, [onDetect]);

  return (
    <ModalShell title="Barkod Tara" onClose={onClose}>
      {supported ? (
        <div className="rounded-2xl overflow-hidden bg-black aspect-square mb-3 flex items-center justify-center relative">
          <video ref={videoRef} className="w-full h-full object-cover" muted playsInline />
          <div className="absolute inset-6 border-2 border-white/70 rounded-xl pointer-events-none" />
        </div>
      ) : (
        <div className="text-xs opacity-60 mb-3 flex items-center gap-2"><Icon name="camera" className="w-4 h-4" /> Tarayıcınız otomatik barkod taramayı desteklemiyor, lütfen barkodu manuel girin.</div>
      )}
      {error && <div className="text-xs text-[var(--red)] mb-3">{error}</div>}
      <div className="flex gap-2">
        <input value={manual} onChange={(e) => setManual(e.target.value)} placeholder="Barkod numarası" className="flex-1 px-4 py-2.5 rounded-xl bg-[var(--cream-2)] dark:bg-[var(--esp-3)] mono outline-none text-sm" />
        <button onClick={() => manual && onDetect(manual)} className="px-4 py-2.5 rounded-xl bg-[var(--wine)] text-white text-sm font-semibold">Ekle</button>
      </div>
    </ModalShell>
  );
}
